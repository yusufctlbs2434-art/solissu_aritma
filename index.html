<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solis Su Arıtma | Profesyonel Arıtma Çözümleri</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root {
--solis-blue:#0077be;
--solis-dark:#002d5b;
--gold:#d4af37;
--white:#ffffff;
--light-bg:#f9fbff;
}

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
font-family:'Poppins',sans-serif;
background:var(--white);
color:#333;
line-height:1.6;
overflow-x:hidden;
}

/* Billboard */

.top-bar{
background:var(--solis-dark);
color:var(--white);
overflow:hidden;
white-space:nowrap;
padding:12px 0;
font-size:0.85rem;
font-weight:600;
border-bottom:2px solid var(--gold);
}

.marquee{
display:inline-block;
animation:marquee 25s linear infinite;
}

.marquee span{
margin-right:60px;
text-transform:uppercase;
letter-spacing:1px;
}

.marquee i{
color:var(--gold);
margin-right:8px;
}

@keyframes marquee{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* Navbar */

nav{
background:var(--white);
padding:10px 0;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.nav-container{
max-width:1400px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
}

.logo-box{
display:flex;
align-items:center;
text-decoration:none;
}

.logo-box img{
height:60px;
margin-right:15px;
}

.logo-text{
font-family:'Montserrat';
font-size:1.6rem;
font-weight:900;
color:var(--solis-dark);
}

.logo-text span{color:var(--gold)}

.nav-links{
display:flex;
list-style:none;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:var(--solis-dark);
font-weight:700;
font-size:0.9rem;
transition:0.3s;
}

.nav-links a:hover{color:var(--gold)}

/* HERO SLIDER */

.hero{
position:relative;
height:65vh;
overflow:hidden;
}

.hero-slider{
position:absolute;
width:100%;
height:100%;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:opacity 1s ease;
}

.slide.active{
opacity:1;
}

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to right,
rgba(0,45,91,0.75) 0%,
rgba(0,45,91,0.5) 35%,
rgba(0,0,0,0) 70%
);
}

.hero-content{
position:absolute;
left:8%;
bottom:18%;
color:white;
max-width:500px;
z-index:2;
text-align:left;
}

.hero-content h4{
font-size:0.9rem;
letter-spacing:2px;
margin-bottom:10px;
}

.hero-content h1{
font-family:'Montserrat';
font-size:3rem;
font-weight:900;
margin-bottom:20px;
}

.hero-content h1 span{
color:var(--gold);
}

.hero-btn{
background:var(--gold);
color:var(--solis-dark);
padding:18px 45px;
border-radius:50px;
text-decoration:none;
font-weight:900;
display:inline-block;
transition:0.3s;
}

.hero-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* Sections */

.section{padding:100px 0;}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* Vizyon Misyon */

.vm-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:80px;
}

.vm-box{
background:var(--light-bg);
padding:50px;
border-radius:20px;
border-bottom:4px solid var(--solis-blue);
}

.vm-box h2{
font-family:'Montserrat';
margin-bottom:20px;
}

/* Video */

.video-section{
padding:100px 0;
background:var(--light-bg);
}

.video-header{
text-align:center;
margin-bottom:60px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.video-card{
border-radius:16px;
overflow:hidden;
background:#000;
box-shadow:0 12px 35px rgba(0,0,0,0.12);
}

.video-card video{
width:100%;
height:420px;
object-fit:cover;
}

.video-overlay{
padding:14px;
background:white;
text-align:center;
font-weight:600;
}

/* Footer */

#contact{
background:var(--solis-dark);
color:white;
text-align:center;
padding:80px 0;
}

.contact-btns{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.c-btn{
padding:15px 40px;
border-radius:50px;
text-decoration:none;
font-weight:700;
color:white;
display:flex;
align-items:center;
gap:10px;
}

.btn-insta{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.btn-wp{background:#25d366}
.btn-mail{background:var(--solis-blue)}

.wa-float{
position:fixed;
bottom:30px;
right:30px;
background:#25d366;
color:white;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:2.2rem;
}

</style>
</head>

</div>

<script>

let slides=document.querySelectorAll(".slide");
let index=0;

function changeSlide(){

slides[index].classList.remove("active");

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

}

setInterval(changeSlide,5000);

</script>
