<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solis Su Arıtma | Profesyonel Arıtma Çözümleri</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
--solis-blue:#0077be;
--solis-dark:#002d5b;
--gold:#d4af37;
--white:#ffffff;
--light-bg:#f9fbff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:var(--white);
}

/* TOP BAR */

.top-bar{
background:var(--solis-dark);
color:white;
padding:12px 0;
text-align:center;
font-size:14px;
}

/* NAVBAR */

nav{
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.nav-container{
max-width:1400px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
}

.logo-box{
display:flex;
align-items:center;
text-decoration:none;
}

.logo-box img{
height:60px;
margin-right:15px;
}

.logo-text{
font-family:'Montserrat';
font-size:1.6rem;
font-weight:900;
color:var(--solis-dark);
}

.logo-text span{
color:var(--gold);
}

.nav-links{
display:flex;
list-style:none;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:var(--solis-dark);
font-weight:700;
}

/* HERO SLIDER */

.hero{
position:relative;
height:65vh;
overflow:hidden;
}

.hero-slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:opacity 1s ease;
}

.hero-slide.active{
opacity:1;
}

/* overlay */

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to right,rgba(0,45,91,0.8),rgba(0,45,91,0.4),transparent);
}

/* slogan */

.hero-content{
position:absolute;
left:8%;
bottom:18%;
color:white;
z-index:2;
max-width:500px;
}

.hero-content h4{
letter-spacing:2px;
margin-bottom:10px;
font-size:14px;
}

.hero-content h1{
font-family:'Montserrat';
font-size:3rem;
margin-bottom:20px;
}

.hero-content span{
color:var(--gold);
}

.hero-btn{
background:var(--gold);
color:var(--solis-dark);
padding:14px 32px;
border-radius:40px;
text-decoration:none;
font-weight:700;
display:inline-block;
}

/* SECTION */

.section{
padding:100px 0;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* VIDEO */

.video-section{
padding:100px 0;
background:var(--light-bg);
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.video-card{
border-radius:16px;
overflow:hidden;
background:black;
}

.video-card video{
width:100%;
height:420px;
object-fit:cover;
}

.video-overlay{
padding:14px;
background:white;
text-align:center;
font-weight:600;
}

/* FOOTER */

#contact{
background:var(--solis-dark);
color:white;
text-align:center;
padding:80px 0;
}

.contact-btns{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.c-btn{
padding:15px 40px;
border-radius:50px;
text-decoration:none;
font-weight:700;
color:white;
display:flex;
align-items:center;
gap:10px;
}

.btn-insta{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.btn-wp{background:#25d366}
.btn-mail{background:var(--solis-blue)}

</style>

</head>

<body>

<div class="top-bar">
81 İLDE ÜCRETSİZ KURULUM • 14 GÜN DENEME • 2 YIL GARANTİ
</div>

<nav>

<div class="nav-container">

<a href="#" class="logo-box">

<img src="img/logo.png">

<div class="logo-text">
SOLİS <span>SU ARITMA</span>
</div>

</a>

<ul class="nav-links">

<li><a href="#">ANASAYFA</a></li>
<li><a href="#">KURUMSAL</a></li>
<li><a href="#">ÜRÜNLER</a></li>
<li><a href="#">İLETİŞİM</a></li>

</ul>

</div>

</nav>

<!-- HERO -->

<header class="hero">

<div class="hero-slide active" style="background-image:url('img/banner.png')"></div>

<div class="hero-slide" style="background-image:url('img/banner2.png')"></div>

<div class="hero-slide" style="background-image:url('img/banner3.jpg')"></div>

<div class="hero-overlay"></div>

<div class="hero-content">

<h4>TEMİZ SUYA BİR ADIM</h4>

<h1>Aileniz İçin <span>En Saf Su</span></h1>

<a href="urunler.html" class="hero-btn">
Detaylı Bilgi Al
</a>

</div>

</header>

<script>

let slides=document.querySelectorAll(".hero-slide");

let index=0;

setInterval(()=>{

slides[index].classList.remove("active");

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

},5000);

</script>

</body>

</html>
